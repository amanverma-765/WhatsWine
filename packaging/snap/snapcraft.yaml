# Snap skeleton for WhatsWine. Build inputs are copied NEXT TO this file first
# (snapcraft can't source files outside the project dir):
#   cp out/make-portable/zip/linux/x64/WhatsWine-linux-x64-1.0.0.zip packaging/snap/
#   cp assets/icon.png packaging/snap/extras/
# then `snapcraft pack` from packaging/snap (or the snapcraft container in CI).
# Publish: `snapcraft login && snapcraft upload --release=stable *.snap` (name must be
# registered first: `snapcraft register whatswine`). See PACKAGING.md for the trademark
# caveat before publishing to the public Snap Store.
name: whatswine
version: '1.0.0'
summary: Unofficial WhatsApp desktop client
description: |
  WhatsWine is an unofficial WhatsApp desktop client for Linux — an Electron
  shell over WhatsApp Web's Windows-hybrid bundle, with native persistence,
  notifications, tray, and real 1:1 voice/video calling with screen share.
  Not affiliated with WhatsApp LLC or Meta Platforms, Inc.
base: core24
confinement: strict
grade: stable
compression: lzo

apps:
  whatswine:
    command: whatswine/WhatsWine --no-sandbox
    desktop: whatswine/whatswine.desktop
    # No gnome extension: its command-chain helpers aren't available in the snapcraft
    # container images, and Electron bundles its own GTK integration — so stage the
    # runtime libs instead (electron-builder's snaps take the same shape).
    environment:
      LD_LIBRARY_PATH: $SNAP/usr/lib/x86_64-linux-gnu:$SNAP/usr/lib:$LD_LIBRARY_PATH
      TMPDIR: $XDG_RUNTIME_DIR
    plugs:
      - audio-playback
      - audio-record
      - browser-support   # provides the Chromium sandbox story under strict confinement
      - camera
      - desktop
      - desktop-legacy
      - home
      - network
      - opengl
      - screen-inhibit-control
      - unity7
      - wayland
      - x11

parts:
  whatswine:
    plugin: dump
    # Repack the zip produced by `npm run make:linux`; copy it next to this file first.
    # The zip nests everything under WhatsWine-linux-x64/ — organize strips that dir.
    source: WhatsWine-linux-x64-1.0.0.zip
    organize:
      'WhatsWine-linux-x64/*': whatswine/
    stage-packages:
      - libgtk-3-0t64
      - libnss3
      - libnotify4
      - libasound2t64
      - libxss1
      - libxtst6
      - libgbm1
      - libxkbcommon0
      - libatk-bridge2.0-0
      - libdrm2
      - libsecret-1-0
  extras:
    plugin: dump
    # The zip carries no .desktop or icon (only the deb/rpm makers emit them).
    # extras/ holds the snap's own desktop file; copy assets/icon.png in before building.
    source: extras
    organize:
      whatswine.desktop: whatswine/whatswine.desktop
      icon.png: whatswine/icon.png
